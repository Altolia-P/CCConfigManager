                    this.propsBody.querySelectorAll('#wfEdgeCond button').forEach(b => b.classList.toggle('active', b.dataset.cond === e.condition));
                    this.propsBody.querySelector('#wfEdgeAuto').style.display = e.condition === 'auto' ? '' : 'none';
                    this.propsBody.querySelector('#wfEdgeManual').style.display = e.condition === 'manual' ? '' : 'none';
                    this.propsBody.querySelector('#wfEdgeExpr').style.display = e.condition === 'expression' ? '' : 'none';
                    const el = this.propsBody.querySelector(e.condition === 'auto' ? '#wfEdgeAutoDetect' : e.condition === 'manual' ? '#wfEdgeManualAdv' : '#wfEdgeExpression');
                    if (el) setTimeout(() => el.focus(), 50);
                    updateEdge();
                };
            });
            return;
        }

        // --- Workflow-level properties (blank canvas click) ---
        if (!selNode) {
            if (this._lastPropsNode === '__wf__' && this.propsOverlay.classList.contains('open')) return;
            this._lastPropsNode = '__wf__';
            this.propsOverlay.classList.add('open');
            this.propsTitle.textContent = '⚙ 工作流属性';
            this.propsBody.innerHTML = `
                <div class="wf-field"><label>名称</label><input id="wfPropWfName" value="${esc_attr(this.wfName||'')}" placeholder="工作流名称"></div>
                <div class="wf-field"><label>Slug</label><input id="wfPropWfSlug" value="${esc_attr(this.slug||'')}" placeholder="文件名标识"></div>
                <div class="wf-field"><label>描述</label><textarea id="wfPropWfDesc" rows="3" placeholder="描述">${esc(this.description||'')}</textarea></div>
                <div class="wf-field"><label>模式</label>
                    <div class="wf-radios" id="wfModeToggle">
                        <button data-mode="auto" class="${this.mode==='auto'?' active':''}">Auto 自动编排</button>
                        <button data-mode="step" class="${this.mode==='step'?' active':''}">Step 阶段门禁</button>
                    </div>
                    <div style="font-size:10px;color:var(--text-secondary);margin-top:4px" id="wfModeHint"></div>
                </div>`;

            const updateWf = () => {
                this.wfName = this.propsBody.querySelector('#wfPropWfName')?.value || '';
                this.slug = this.propsBody.querySelector('#wfPropWfSlug')?.value || '';
                this.description = this.propsBody.querySelector('#wfPropWfDesc')?.value || '';
                this.updateStatus();
            };
            this.propsBody.querySelector('#wfPropWfName').oninput = updateWf;
            this.propsBody.querySelector('#wfPropWfSlug').oninput = updateWf;
            this.propsBody.querySelector('#wfPropWfDesc').oninput = updateWf;

            this.propsBody.querySelectorAll('#wfModeToggle button').forEach(btn => {
                btn.onclick = () => {
                    const newMode = btn.dataset.mode;
                    if (newMode !== this.mode) {
                        this.mode = newMode;
                        if (newMode === 'step') {
                            this.nodes.forEach(n => {
                                if (n.type === 'agent') {
                                    if (!n.permissions) n.permissions = {allows:[],blocks:[]};
                                    if (!n.produces) n.produces = [];
                                    if (!n.hooks) n.hooks = [];
                                }
                            });
                        }
                        this.propsBody.querySelectorAll('#wfModeToggle button').forEach(b => b.classList.toggle('active', b.dataset.mode === this.mode));
                        const badge = this.canvasWrap.querySelector('.wf-mode-badge');
                        if (badge) { badge.textContent = newMode === 'step' ? 'Step 阶段门禁' : 'Auto 自动编排'; badge.className = 'wf-mode-badge ' + newMode; }
                        const hint = this.propsBody.querySelector('#wfModeHint');
                        hint.textContent = newMode === 'auto' ? '⚠ Permissions/Produces 保留但 Auto 模式不使用' : '⚠ 已解锁 Gate/Hook 节点和 Permissions 编辑';
                        // Show/hide Gate/Hook buttons in sidebar
                        const gateBtn = this.sidebarEl.querySelector('.wf-node-type-btn[data-add="gate"]');
                        const hookBtn = this.sidebarEl.querySelector('.wf-node-type-btn[data-add="hook"]');
                        if (gateBtn) gateBtn.style.display = newMode === 'step' ? '' : 'none';
                        if (hookBtn) hookBtn.style.display = newMode === 'step' ? '' : 'none';
                        this.pushSnapshot();
                    }
                };
            });
            return;
        }

        // --- Node properties ---
        // Skip rebuild if same node and panel already open
        if (this._lastPropsNode === selNode.id && this.propsOverlay.classList.contains('open')) return;
        this._lastPropsNode = selNode.id;
        this.propsOverlay.classList.add('open');
        const n = selNode;

        if (n.type === 'agent') {
            this.propsTitle.textContent = '📋 节点属性';
            const currentSkills = n.skillIds || [];
            const agents = (WF._cachedAgents||[]).map(a => `<option value="${esc_attr(a.slug)}"${n.agentId===a.slug?' selected':''}>${esc(a.name||a.slug)}</option>`).join('');
            const skillChecks = (WF._cachedSkills||[]).map(s => {
                const checked = currentSkills.includes(s.slug);
                return `<label class="wf-skill-check"><input type="checkbox" value="${esc_attr(s.slug)}"${checked?' checked':''}> ${esc(s.name||s.slug)}</label>`;
            }).join('');
            // Permissions — predefined options + custom
            const PERM_OPTIONS = ['Read', 'Write', 'Edit', 'Bash', 'Skill', 'WebFetch', 'WebSearch', 'TaskCreate', 'TaskUpdate', 'Glob', 'Grep', 'PushNotification', 'AskUserQuestion'];
            // Dynamic suggestions: static patterns + auto-discovered Skills
            const PERM_SUGGEST = [
                'Write(*.md)', 'Write(*.java)', 'Write(*.py)', 'Write(*.json)', 'Write(*.ts)', 'Write(*.tsx)', 'Write(*.vue)',
                'Edit(*.md)', 'Edit(*.java)', 'Edit(*.py)', 'Edit(*.ts)', 'Edit(*.tsx)', 'Edit(*.vue)', 'Edit(*.json)', 'Edit(*.yaml)',
                'Bash(pytest)', 'Bash(mvn test)', 'Bash(gradle test)', 'Bash(python)', 'Bash(npm test)', 'Bash(npm run build)'
            ];
            // Auto-discover: add Skill(name) for every available skill
            (WF._cachedSkills||[]).forEach(s => {
                const p = `Skill(${s.slug})`;
                if (!PERM_SUGGEST.includes(p)) PERM_SUGGEST.push(p);
            });
            const permAllows = n.permissions?.allows||[];
            const permBlocks = n.permissions?.blocks||[];
            const renderPermChecks = (list, prefix) => {
                let h = '<div class="wf-perm-checks">';
                PERM_OPTIONS.forEach(p => {
                    const checked = list.includes(p) ? ' checked' : '';
                    h += `<label class="wf-perm-check"><input type="checkbox" value="${p}" data-perm="${prefix}"${checked}> ${p}</label>`;
                });
                // Custom entries not in predefined list
                const custom = list.filter(p => !PERM_OPTIONS.includes(p));
                h += '</div><div class="wf-perm-custom">';
                custom.forEach(p => {
                    h += `<span class="wf-tag">${esc(p)}<button class="wf-tag-x" data-perm-val="${esc_attr(p)}" data-perm="${prefix}">×</button></span>`;
                });
                h += `<div style="display:flex;align-items:center;gap:4px;margin-top:4px"><input class="wf-perm-input" data-perm="${prefix}" placeholder="自定义…" style="font-size:10px;padding:3px 6px;border:1px solid var(--border);border-radius:4px;width:140px"><button class="btn wf-perm-add-btn" data-perm="${prefix}" style="font-size:10px;padding:3px 8px">添加</button></div>`;
                // Quick-fill suggestions
                h += '<div class="wf-perm-suggest">';
                PERM_SUGGEST.forEach(s => {
                    h += `<button class="wf-perm-chip" data-perm="${prefix}" data-val="${esc_attr(s)}">${esc(s)}</button>`;
                });
                h += '</div>';
                return h;
            };
            const produceTags = (n.produces||[]).map(p => `<span class="wf-tag">${esc(p)}<button class="wf-tag-x" data-produce="${esc_attr(p)}">×</button></span>`).join(' ');
            const nodeHooks = (n.hooks||[]).map((h,i) => `<div class="wf-hook-row"><span style="font-size:10px;color:var(--text-secondary)">${h.timing==='onEnter'?'进入':'离开'}·${h.type}</span> <span style="flex:1;font-size:11px">${esc(h.value||'')}</span><button class="wf-hook-del" data-hook-idx="${i}">×</button></div>`).join('');

            this.propsBody.innerHTML = `
                <div class="wf-field"><label>节点类型</label><select id="wfPropType">
                    <option value="agent" selected>📋 Agent 节点</option>
                    <option value="gate">🔷 Gate 门禁</option>
                    <option value="hook">⚡ Hook 钩子</option>
                </select></div>
                <div class="wf-field"><label>标签</label><input id="wfPropLabel" value="${esc_attr(n.label||'')}" placeholder="节点名称"></div>
                <div class="wf-field"><label>Agent</label><select id="wfPropAgent"><option value="">未指定</option>${agents}</select></div>
                <div class="wf-field"><label>Skills（多选）</label>
                    <input id="wfSkillSearch" placeholder="搜索 Skill..." style="padding:5px 8px;font-size:11px;border:1px solid var(--border);border-radius:4px;outline:none;margin-bottom:4px" oninput="WF.filterSkillList()">
                    <div class="wf-skill-list" id="wfSkillList">${skillChecks||'<span style="font-size:11px;color:var(--text-secondary)">无可用</span>'}</div>
                </div>
                ${this.mode==='step'?`
                <div class="wf-field"><label>Permissions · Allows</label>${renderPermChecks(permAllows, 'allows')}</div>
                <div class="wf-field"><label>Permissions · Blocks</label>${renderPermChecks(permBlocks, 'blocks')}</div>
                <div class="wf-field"><label>Produces（产出文件）</label>
                    <div style="display:flex;gap:4px"><input id="wfPropProducesAdd" placeholder="产出文件名" style="flex:1;font-size:11px"><button id="wfPropProducesBtn" class="btn" style="font-size:10px;padding:4px 8px">+添加</button></div>
                    <div class="wf-tag-list" id="wfPropProducesList">${produceTags||'<span style="font-size:10px;color:var(--text-secondary)">无</span>'}</div>
                </div>
                <div class="wf-field"><label>Hooks</label>
                    <div style="font-size:10px;color:var(--text-secondary);margin-bottom:4px">
                        <select id="wfHookTiming" style="font-size:10px;padding:2px"><option value="onEnter">进入时</option><option value="onLeave">离开时</option></select>
                        <select id="wfHookType" style="font-size:10px;padding:2px"><option value="shell">Shell</option><option value="agent">Agent</option></select>
                        <input id="wfHookVal" placeholder="命令/agent名" style="font-size:10px;width:100px;padding:2px">
                        <button id="wfHookAdd" class="btn" style="font-size:10px;padding:2px 6px">+</button>
                    </div>
                    <div class="wf-hook-list" id="wfHookList">${nodeHooks||'<span style="font-size:10px;color:var(--text-secondary)">无</span>'}</div>
                </div>`:''}`;

            // Type switch
            const typeEl = this.propsBody.querySelector('#wfPropType');
            if (typeEl) typeEl.onchange = () => {
                if (typeEl.value !== n.type) { n.type = typeEl.value; this.renderProps(); }
            };

            const labelEl = this.propsBody.querySelector('#wfPropLabel');
            const agentEl = this.propsBody.querySelector('#wfPropAgent');
            const onChange = () => {
                n.label = labelEl.value; n.agentId = agentEl.value || null;
                const checks = this.propsBody.querySelectorAll('.wf-skill-check input[type=checkbox]');
                n.skillIds = [...checks].filter(cb => cb.checked).map(cb => cb.value);
                this.renderNodes(); this.updateStatus();
            };
            if (labelEl) labelEl.oninput = onChange;
            if (agentEl) agentEl.onchange = onChange;
            this.propsBody.querySelectorAll('.wf-skill-check input[type=checkbox]').forEach(cb => { cb.onchange = onChange; });

            // Step-mode fields
            if (this.mode === 'step') {
                n.permissions = n.permissions || {allows:[],blocks:[]};
                n.produces = n.produces || [];
                n.hooks = n.hooks || [];
                // Permissions
                const addPermCustom = (prefix) => {
                    const inp = this.propsBody.querySelector(`.wf-perm-input[data-perm="${prefix}"]`);
                    const val = inp.value.trim();
                    if (!val) return;
                    const list = prefix === 'allows' ? n.permissions.allows : n.permissions.blocks;
                    if (!list.includes(val)) { list.push(val); this._lastPropsNode = null; this.renderProps(); }
                    inp.value = '';
                };
                this.propsBody.querySelectorAll('.wf-perm-check input[type=checkbox]').forEach(cb => {
                    cb.onchange = () => {
                        const list = cb.dataset.perm === 'allows' ? n.permissions.allows : n.permissions.blocks;
                        if (cb.checked) { if (!list.includes(cb.value)) list.push(cb.value); }
                        else { const idx = list.indexOf(cb.value); if (idx >= 0) list.splice(idx, 1); }
                        this._lastPropsNode = null; this.renderProps();
                    };
                });
                this.propsBody.querySelectorAll('.wf-perm-add-btn').forEach(btn => {
                    btn.onclick = () => addPermCustom(btn.dataset.perm);
                });
                this.propsBody.querySelectorAll('.wf-perm-input').forEach(inp => {
                    inp.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); addPermCustom(inp.dataset.perm); } };
                });
                this.propsBody.querySelectorAll('.wf-perm-chip').forEach(chip => {
                    chip.onclick = () => {
                        const prefix = chip.dataset.perm;
                        const val = chip.dataset.val;
                        const list = prefix === 'allows' ? n.permissions.allows : n.permissions.blocks;
                        if (!list.includes(val)) { list.push(val); this._lastPropsNode = null; this.renderProps(); }
                    };
                });
                this.propsBody.querySelectorAll('.wf-tag-x[data-perm-val]').forEach(btn => {
                    btn.onclick = () => {
                        const prefix = btn.dataset.perm;
                        const val = btn.dataset.permVal;
                        const list = prefix === 'allows' ? n.permissions.allows : n.permissions.blocks;
                        const idx = list.indexOf(val);
                        if (idx >= 0) { list.splice(idx, 1); this._lastPropsNode = null; this.renderProps(); }
                    };
                });
                // Produces
                this.propsBody.querySelector('#wfPropProducesBtn').onclick = () => {
                    const inp = this.propsBody.querySelector('#wfPropProducesAdd');
                    const val = inp.value.trim();
                    if (val && !n.produces.includes(val)) { n.produces.push(val); this.renderProps(); }
                    inp.value = '';
                };
                this.propsBody.querySelectorAll('.wf-tag-x').forEach(btn => {
                    btn.onclick = () => { n.produces = n.produces.filter(p => p !== btn.dataset.produce); this.renderProps(); };
                });
                // Hooks
                this.propsBody.querySelector('#wfHookAdd').onclick = () => {
                    const t = this.propsBody.querySelector('#wfHookTiming').value;
                    const ty = this.propsBody.querySelector('#wfHookType').value;
                    const v = this.propsBody.querySelector('#wfHookVal').value.trim();
                    if (v) { n.hooks.push({timing:t, type:ty, value:v}); this.renderProps(); }
                };

                    btn.onclick = () => { n.hooks.splice(parseInt(btn.dataset.hookIdx), 1); this.renderProps(); };
                });
            }

        } else if (n.type === 'gate') {
            this.propsTitle.textContent = '🔷 门禁属性';
            const gc = n.gateConfig || { condition: 'auto', autoDetect: '', manualAdvance: '', expression: '' };

            const sel = c => gc.condition === c ? ' active' : '';

                <div class="wf-field"><label>标签</label><input id="wfPropLabel" value="${esc_attr(n.label||'')}" placeholder="门禁名称"></div>
                <div class="wf-field"><label>触发条件</label>
                    <div class="wf-radios" id="wfGateCond">

                        <button data-cond="manual" class="${sel('manual')}">手动</button>

                    </div>
                </div>

                <div class="wf-field" id="wfGateManual" style="display:${gc.condition==='manual'?'':'none'}"><label>手动确认说明</label><input id="wfPropManual" value="${esc_attr(gc.manualAdvance||'')}" placeholder="如：代码审查通过后手动确认"></div>
                <div class="wf-field" id="wfGateExpr" style="display:${gc.condition==='expression'?'':'none'}"><label>条件表达式</label><textarea id="wfPropExpr" rows="3" placeholder="如：review.score >= 8">${esc(gc.expression||'')}</textarea></div>`;

            // Bind
            const updateGate = () => {
                n.label = this.propsBody.querySelector('#wfPropLabel')?.value || n.label;
                n.gateConfig.autoDetect = this.propsBody.querySelector('#wfPropAuto')?.value || '';

                n.gateConfig.expression = this.propsBody.querySelector('#wfPropExpr')?.value || '';

            this.propsBody.querySelector('#wfPropLabel').oninput = updateGate;
            this.propsBody.querySelector('#wfPropAuto')?.addEventListener('input', updateGate);
            this.propsBody.querySelector('#wfPropManual')?.addEventListener('input', updateGate);
            this.propsBody.querySelector('#wfPropExpr')?.addEventListener('input', updateGate);
            this.propsBody.querySelectorAll('#wfGateCond button').forEach(btn => {

                    this.propsBody.querySelector('#wfGateExpr').style.display = gc.condition === 'expression' ? '' : 'none';
                    // Focus the newly shown input
                    setTimeout(() => {

                        const inp = this.propsBody.querySelector(el);
                        if (inp) inp.focus();
                    }, 50);
                };
            });

        } else if (n.type === 'hook') {
            this.propsTitle.textContent = '⚡ 钩子属性';
            const hc = n.hookConfig || { type: 'shell', timing: 'onEnter', value: '' };
            if (!n.hookConfig) n.hookConfig = hc;
            const selT = t => hc.type === t ? ' active' : '';
            const selM = m => hc.timing === m ? ' active' : '';
            const agents = (WF._cachedAgents||[]).map(a => `<option value="${esc_attr(a.slug)}"${hc.type==='agent' && hc.value===a.slug?' selected':''}>${esc(a.name||a.slug)}</option>`).join('');
            this.propsBody.innerHTML = `
                <div class="wf-field"><label>标签</label><input id="wfPropLabel" value="${esc_attr(n.label||'')}" placeholder="钩子名称"></div>
                <div class="wf-field"><label>类型</label>
                    <div class="wf-radios" id="wfHookType">
                        <button data-type="shell" class="${selT('shell')}">Shell 命令</button>
                        <button data-type="agent" class="${selT('agent')}">Agent</button>
                    </div>
                </div>
                <div class="wf-field"><label>触发时机</label>
                    <div class="wf-radios" id="wfHookTiming">
                        <button data-timing="onEnter" class="${selM('onEnter')}">进入时</button>
                        <button data-timing="onLeave" class="${selM('onLeave')}">离开时</button>
                    </div>
                </div>
                <div class="wf-field" id="wfHookValShell" style="display:${hc.type==='shell'?'':'none'}"><label>Shell 命令</label><input id="wfPropShell" value="${esc_attr(hc.type==='shell'?hc.value:'')}" placeholder="如：npm run test"></div>
                <div class="wf-field" id="wfHookValAgent" style="display:${hc.type==='agent'?'':'none'}"><label>选择 Agent</label><select id="wfPropAgent"><option value="">未指定</option>${agents}</select></div>`;

            const updateHook = () => {
                n.label = this.propsBody.querySelector('#wfPropLabel')?.value || n.label;
                hc.value = hc.type === 'shell'
                    ? (this.propsBody.querySelector('#wfPropShell')?.value || '')
                    : (this.propsBody.querySelector('#wfPropAgent')?.value || '');
                this.renderNodes(); this.updateStatus();
            };
            this.propsBody.querySelector('#wfPropLabel').oninput = updateHook;
            this.propsBody.querySelector('#wfPropShell')?.addEventListener('input', updateHook);
            this.propsBody.querySelector('#wfPropAgent')?.addEventListener('change', updateHook);
            this.propsBody.querySelectorAll('#wfHookType button').forEach(btn => {
                btn.onclick = () => {
                    hc.type = btn.dataset.type;
                    // Toggle display only
                    this.propsBody.querySelectorAll('#wfHookType button').forEach(b => b.classList.toggle('active', b.dataset.type === hc.type));
                    const shellEl = this.propsBody.querySelector('#wfHookValShell');
                    const agentEl = this.propsBody.querySelector('#wfHookValAgent');
                    if (shellEl) shellEl.style.display = hc.type === 'shell' ? '' : 'none';
                    if (agentEl) agentEl.style.display = hc.type === 'agent' ? '' : 'none';
                    // Focus appropriate input
                    setTimeout(() => {
                        const el = this.propsBody.querySelector(hc.type === 'shell' ? '#wfPropShell' : '#wfPropAgent');
                        if (el) el.focus();
                    }, 50);
                };
            });
            this.propsBody.querySelectorAll('#wfHookTiming button').forEach(btn => {
                btn.onclick = () => {
                    hc.timing = btn.dataset.timing;
                    this.propsBody.querySelectorAll('#wfHookTiming button').forEach(b => b.classList.toggle('active', b.dataset.timing === hc.timing));
                    updateHook();
                };
            });
        }
    },

    renderNodes() {
        let h = '';
        this.nodes.forEach(n => {
            const sel = n.id === this.selectedId;
            const x = n.position.x, y = n.position.y;
            if (n.type === 'gate') {
                // Diamond gate: 120x70
                h += `<g class="wf-node node-gate${sel?' selected':''}" data-node-id="${n.id}" transform="translate(${x},${y})">
                    <polygon class="node-body" points="60,0 120,35 60,70 0,35"/>
                    <rect class="node-icon-bg" x="50" y="6" width="20" height="20" rx="4"/>
                    <text x="60" y="20" font-size="14" text-anchor="middle" fill="var(--color-unknown)">◇</text>
                    <text class="node-title" x="60" y="45" text-anchor="middle"><title>${esc(n.label||'Gate')}</title>${esc(trunc(n.label||'Gate',5))}</text>
                    <circle class="node-handle" data-node-id="${n.id}" data-handle="input" cx="0" cy="35" r="8"/>
                    <circle class="node-handle" data-node-id="${n.id}" data-handle="output" cx="120" cy="35" r="8"/>
                    <circle class="node-del-btn-circle" data-del="${n.id}" cx="108" cy="5" r="9"/>
                    <text class="node-del-btn-x" data-del="${n.id}" x="104" y="9" font-size="14" font-weight="700">×</text>
                </g>`;
            } else if (n.type === 'hook') {
                // Hook pill: 140x36
                h += `<g class="wf-node node-hook${sel?' selected':''}" data-node-id="${n.id}" transform="translate(${x},${y})">
                    <rect class="node-body" x="0" y="0" width="140" height="36" rx="18"/>
                    <rect class="node-icon-bg" x="6" y="6" width="24" height="24" rx="12"/>
                    <text x="18" y="22" font-size="14" text-anchor="middle">⚡</text>
                    <text class="node-title" x="36" y="23"><title>${esc(n.label||'Hook')}</title>${esc(trunc(n.label||'Hook',12))}</text>
                    <circle class="node-handle" data-node-id="${n.id}" data-handle="input" cx="0" cy="18" r="7"/>
                    <circle class="node-handle" data-node-id="${n.id}" data-handle="output" cx="140" cy="18" r="7"/>
                    <circle class="node-del-btn-circle" data-del="${n.id}" cx="128" cy="5" r="9"/>
                    <text class="node-del-btn-x" data-del="${n.id}" x="124" y="9" font-size="13" font-weight="700">×</text>
                </g>`;
            } else {
                // Agent node: 200x64, nicer layout
                h += `<g class="wf-node node-agent${sel?' selected':''}" data-node-id="${n.id}" transform="translate(${x},${y})">
                    <rect class="node-body" x="0" y="0" width="200" height="64" rx="8"/>
                    <rect class="node-body-bg" x="0" y="0" width="200" height="64" rx="8"/>
                    <rect class="node-icon-bg" x="10" y="14" width="36" height="36" rx="6"/>
                    <text x="28" y="37" font-size="16" text-anchor="middle">🤖</text>
                    <text class="node-title" x="54" y="24"><title>${esc(n.label||'步骤')}</title>${esc(trunc(n.label||'步骤',8))}</text>
                    <text class="node-sub" x="54" y="40"><title>${esc(n.agentId||'未指定 Agent')}</title>${esc(trunc(n.agentId||'未指定 Agent',16))}</text>
                    ${(n.skillIds||[]).length ? `<text class="node-sub" x="54" y="54" fill="var(--color-superpowers)">+${n.skillIds.length} Skills</text>` : ''}
                    <circle class="node-handle" data-node-id="${n.id}" data-handle="input" cx="0" cy="32" r="8"/>
                    <circle class="node-handle" data-node-id="${n.id}" data-handle="output" cx="200" cy="32" r="8"/>
                    <circle class="node-del-btn-circle" data-del="${n.id}" cx="188" cy="4" r="9"/>
                    <text class="node-del-btn-x" data-del="${n.id}" x="184" y="8" font-size="13" font-weight="700">×</text>
                    <circle class="node-add-btn-circle" data-node-id="${n.id}" cx="218" cy="32" r="9"/>
                    <text class="node-add-btn-plus" data-node-id="${n.id}" x="214" y="36" font-size="16" font-weight="700">+</text>
                </g>`;
            }
        });
        this.nodesGroup.innerHTML = h;

        // Bind delete (×) buttons on nodes
        this.nodesGroup.querySelectorAll('.node-del-btn-circle, .node-del-btn-x').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                const nid = el.dataset.del;
                if (nid) { this.selectedId = nid; this.deleteSelected(); }
            };
        });

        // Bind "+" button clicks on nodes
        this.nodesGroup.querySelectorAll('.node-add-btn-circle').forEach(el => {
            el.onclick = (e) => {
                e.stopPropagation();
                const nodeId = el.dataset.nodeId;
                const node = this.nodes.find(n => n.id === nodeId);
                if (node) {
                    const nx = node.position.x + 280, ny = node.position.y;
                    this.addNode(this.mode === 'step' ? 'agent' : 'agent', nx, ny, nodeId);
                }
            };
        });
    },

    renderEdges() {
        let h = '';
        this.edges.forEach(e => {
            const sel = e.id === this.selectedId;
            const from = this.nodes.find(n => n.id === e.from);
            const to = this.nodes.find(n => n.id === e.to);
            if (!from || !to) return;
            const [x1, y1] = this.getOutputPos(from);
            const [x2, y2] = this.getInputPos(to);
            const d = this.bezierPath(x1, y1, x2, y2);
            h += `<path class="wf-edge-hit" data-edge-id="${e.id}" d="${d}"/><path class="wf-edge${sel?' selected':''}" data-edge-id="${e.id}" d="${d}" marker-end="url(#wfArrow)"/>`;
        });
        this.edgesGroup.innerHTML = h;
    },

    updateEdgesForNode(nodeId) {
        this.edges.forEach(e => {
            if (e.from !== nodeId && e.to !== nodeId) return;
            const from = this.nodes.find(n => n.id === e.from);
            const to = this.nodes.find(n => n.id === e.to);
            if (!from || !to) return;
            const pathEl = this.edgesGroup.querySelector(`[data-edge-id="${e.id}"]`);
            if (pathEl) {
                const [x1, y1] = this.getOutputPos(from);
                const [x2, y2] = this.getInputPos(to);
                pathEl.setAttribute('d', this.bezierPath(x1, y1, x2, y2));
            }
        });
    },

    renderTempEdge() {
        if (!this.drawing) { this.tempEdge.style.display = 'none'; return; }
        const [x1, y1] = this.getOutputPos(this.nodes.find(n => n.id === this.drawing.fromNodeId) || {position:{x:0,y:0}});
        const rect = this.svg.getBoundingClientRect();
        const x2 = (this.drawing.mouseX - rect.left - this.panX) / this.zoom;
        const y2 = (this.drawing.mouseY - rect.top - this.panY) / this.zoom;
        this.tempEdge.setAttribute('d', this.bezierPath(x1, y1, x2, y2));
        this.tempEdge.style.display = '';
    },

    getOutputPos(node) { return [node.position.x + (node.type==='gate'?120:node.type==='hook'?140:200), node.position.y + (node.type==='gate'?35:node.type==='hook'?18:32)]; },
    getInputPos(node) { return [node.position.x, node.position.y + (node.type==='gate'?35:node.type==='hook'?18:32)]; },

    bezierPath(x1, y1, x2, y2) {
        const dx = Math.abs(x2 - x1) * 0.5;
        const cx1 = x1 + dx, cy1 = y1;
        const cx2 = x2 - dx, cy2 = y2;
        return `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`;
    },

    // --- Node/Edge operations ---
    addNode(type, x, y, fromNodeId) {
        const id = 'n' + (this.nextId++);
        const node = { id, type, label: '新步骤', position: {x, y} };
        if (type === 'agent') {
            node.label = '新步骤';
            node.agentId = null;
            node.skillIds = [];
            if (this.mode === 'step') { node.permissions = {allows:[],blocks:[]}; node.produces = []; }
            node.hooks = [];
        } else if (type === 'gate') {
            node.label = '门禁';
            node.gateConfig = { condition: 'auto', autoDetect: '', manualAdvance: '', expression: '' };
        } else if (type === 'hook') {
            node.label = '钩子';
            node.hookConfig = { type: 'shell', timing: 'onEnter', value: '' };
        }
        this.nodes.push(node);
        if (fromNodeId) {
            this.edges.push({
                id: 'e' + (this.nextId++),
                from: fromNodeId, to: id,
                condition: this.mode === 'auto' ? 'auto' : 'manual'
            });
        }
        this.selectedId = id;
        this.pushSnapshot();
        this.render();
    },

    deleteSelected() {
        if (!this.selectedId) return;
        const isNode = this.nodes.some(n => n.id === this.selectedId);
        if (isNode) {
            this.nodes = this.nodes.filter(n => n.id !== this.selectedId);
            this.edges = this.edges.filter(e => e.from !== this.selectedId && e.to !== this.selectedId);
        } else {
            this.edges = this.edges.filter(e => e.id !== this.selectedId);
        }
        this.selectedId = null;
        this._lastPropsNode = null;
        this.pushSnapshot();
        this.render();
    },

    filterSkillList() {
        const searchEl = this.propsBody?.querySelector('#wfSkillSearch');
        const listEl = this.propsBody?.querySelector('#wfSkillList');
        if (!searchEl || !listEl) return;
        const q = searchEl.value.toLowerCase();
        listEl.querySelectorAll('.wf-skill-check').forEach(el => {
            el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
    },

    // --- Undo/Redo ---
    pushSnapshot() {
        const snap = JSON.stringify({nodes: this.nodes, edges: this.edges});
        this.undoStack.push(snap);
        if (this.undoStack.length > this.maxUndo) this.undoStack.shift();
        this.redoStack = [];
        this.updateStatus();
    },

    isDirty() { return this.undoStack.length > 1; },

    markClean() {
        // Reset undo stack to just the current saved state
        const snap = JSON.stringify({nodes: this.nodes, edges: this.edges});
        this.undoStack = [snap];
        this.redoStack = [];
        this.updateStatus();
    },

    undo() {
        if (this.undoStack.length <= 1) return;
        this.redoStack.push(this.undoStack.pop());
        this.restoreSnapshot(this.undoStack[this.undoStack.length - 1]);
    },

    redo() {
        if (!this.redoStack.length) return;
        const snap = this.redoStack.pop();
        this.undoStack.push(snap);
        this.restoreSnapshot(snap);
    },

    restoreSnapshot(snap) {
        try {
            const data = JSON.parse(snap);
            this.nodes = data.nodes;
            this.edges = data.edges;
            this.selectedId = null;
            this._lastPropsNode = null;
            this.render();
        } catch(e) {
            this.undoStack = []; this.redoStack = [];
            showToast('撤销数据损坏，已重置', 'error');
        }
    },

    // --- Status ---
    updateStatus() {
        const el = this.canvasWrap.querySelector('#wfStatus');
        if (!el) return;
        const dirty = this.isDirty();
        el.innerHTML = `${this.nodes.length} 节点 &middot; ${this.edges.length} 连线${dirty?' <span class="unsaved">● 未保存</span>':''}`;
    },

    // --- Serialization ---
    toJSON() {
        return {
            slug: this.slug,
            name: this.wfName,
            description: this.description,
            mode: this.mode,
            nodes: this.nodes,
            edges: this.edges
        };
    },

    destroy() {
        if (this._abort) { this._abort.abort(); this._abort = null; }
        this.nodes = []; this.edges = []; this.selectedId = null;
        this.undoStack = []; this.redoStack = [];
        this.svg = null; this.viewport = null; this.edgesGroup = null; this.nodesGroup = null;
        this.dragging = null; this.drawing = null; this.panning = null;
        if (this.canvasWrap) this.canvasWrap.innerHTML = '';
    }
};

async function newWorkflow() {
    const name = prompt('工作流名称：');
    if (!name || !name.trim()) return;
    const mode = confirm('使用 Step 阶段门禁模式？\n确定=Step，取消=Auto') ? 'step' : 'auto';
    try {
        const r = await fetch(`${API}/api/workflows/create`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name.trim(), mode})
        });
        const data = await r.json();
        showToast(data.message, data.success?'success':'error');
        if (data.success) {
            state.type = 'workflow';
            await Promise.all([loadItems(), loadStats()]);
        }
    } catch(e) { showToast('创建失败', 'error'); }
}

// --- Workflow integration ---
function initWorkflowEditor(item) {
    let data;
    try {
        data = JSON.parse(item.raw_content);
    } catch(e) {
        showToast('工作流 JSON 解析失败', 'error');
        return;
    }

    // Convert v1 format to v2 if needed
    if (!data.nodes) {
        data = convertV1ToV2(data);
    }

    const panel = $('#detailPanel');
    panel.classList.add('wf-active');
    WF.init(panel, data);

    // Fullscreen toggle
    const btnFs = $('#btnWfFullscreen');
    if (btnFs) {
        btnFs.onclick = () => {
            const sidebar = $('#sidebar'), list = $('#listPanel'), detail = $('#detailPanel');
            if (detail.style.position === 'fixed') {
                detail.style.cssText = '';
                sidebar.style.display = ''; list.style.display = '';
                btnFs.textContent = '⛶ 展开全屏';
            } else {
                sidebar.style.display = 'none'; list.style.display = 'none';
                detail.style.cssText = 'position:fixed;inset:0;z-index:50;background:var(--bg);padding:16px;overflow:auto';
                btnFs.textContent = '⛶ 收起';
                setTimeout(() => WF.fitView(), 100);
            }
        };
    }

    // Save button (inside canvas toolbar)
    const btnSaveCanvas = panel.querySelector('#btnWfSaveCanvas');
    if (btnSaveCanvas) {
        btnSaveCanvas.onclick = async () => {
            btnSaveCanvas.disabled = true; btnSaveCanvas.textContent = '保存中...';
            try {
                const json = WF.toJSON();
                const r = await fetch(`${API}/api/item/workflows/${encodeURIComponent(item.name)}`, {
                    method:'PUT', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({content: JSON.stringify(json, null, 2)})
                });
                const resp = await r.json();
                showToast(resp.message, resp.success?'success':'error');
                if (resp.success) {
                    item.content_preview = JSON.stringify(json, null, 2);
                    item.raw_content = JSON.stringify(json, null, 2);
                    item.description = json.description;
                    state.selected = item;
                    WF.markClean();
                }
            } catch(e) { showToast('保存失败: '+e.message, 'error'); }
            btnSaveCanvas.disabled = false; btnSaveCanvas.textContent = '💾 保存';
        };
    }

    // Export button (inside canvas toolbar)
    const btnExportCanvas = panel.querySelector('#btnWfExportCanvas');
    if (btnExportCanvas) {
        btnExportCanvas.onclick = () => {
            window.open(`${API}/api/workflows/${encodeURIComponent(item.name)}/export`, '_blank');
        };
    }

    // Copy button (inside canvas toolbar)
    const btnCopyCanvas = panel.querySelector('#btnWfCopyCanvas');
    if (btnCopyCanvas) {
        btnCopyCanvas.onclick = async () => {
            const r = await fetch(`${API}/api/workflows/${encodeURIComponent(item.name)}/copy`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({})
            });
            const data = await r.json();
            showToast(data.message, data.success?'success':'error');
            if (data.success) { loadItems(); loadStats(); }
        };
    }

    // Delete button (inside canvas toolbar)
    const btnDelCanvas = panel.querySelector('#btnWfDeleteCanvas');
    if (btnDelCanvas) {
        btnDelCanvas.onclick = () => {
            if (confirm(`确定删除工作流 "${item.name}"？\n此操作不可恢复。`)) {
                fetch(`${API}/api/workflows/${encodeURIComponent(item.name)}`, {method:'DELETE'})
                    .then(r => r.json()).then(data => {
                        showToast(data.message, data.success?'success':'error');
                        if (data.success) {
                            panel.innerHTML = '<div class="empty-state"><div class="empty-icon">🗑</div>已删除</div>';
                            panel.classList.remove('wf-active');
                            loadItems(); loadStats();
                        }
                    }).catch(() => showToast('删除失败', 'error'));
            }
        };
    }

    // Fit view button
    const btnFv = $('#btnFitView');
    if (btnFv) btnFv.onclick = () => WF.fitView();

    // Delete button
    const btnDel = $('#btnWfDelete');
    if (btnDel) {
        btnDel.onclick = () => {
            if (confirm(`确定删除工作流 "${item.name}"？\n此操作不可恢复。`)) {
                fetch(`${API}/api/workflows/${encodeURIComponent(item.name)}`, {method:'DELETE'})
                    .then(r => r.json()).then(data => {
                        showToast(data.message, data.success?'success':'error');
                        if (data.success) {
                            $('#detailPanel').innerHTML = '<div class="empty-state"><div class="empty-icon">🗑</div>已删除</div>';
                            $('#detailPanel').classList.remove('wf-active');
                            loadItems(); loadStats();
                        }
                    }).catch(e => showToast('删除失败', 'error'));
            }
        };
    }

    // Save button
    const btnSave = $('#btnWfSave');
    if (btnSave) {
        btnSave.onclick = async () => {
            btnSave.disabled = true; btnSave.textContent = '保存中...';
            try {
                const json = WF.toJSON();
                const r = await fetch(`${API}/api/item/workflows/${encodeURIComponent(item.name)}`, {
                    method:'PUT', headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({content: JSON.stringify(json, null, 2)})
                });
                const resp = await r.json();
                showToast(resp.message, resp.success?'success':'error');
                if (resp.success) {
                    item.content_preview = JSON.stringify(json, null, 2);
                    item.raw_content = JSON.stringify(json, null, 2);
                    item.description = json.description;
                    state.selected = item;
                    WF.markClean();
                }
            } catch(e) { showToast('保存失败: '+e.message, 'error'); }
            btnSave.disabled = false; btnSave.textContent = '💾 保存';
        };
    }
}

function convertV1ToV2(data) {
    const nodes = [], edges = [];
    const isStep = !!(data.phases && data.phases.length);
    const items = isStep ? data.phases : (data.steps || []);
    items.forEach((item, i) => {
        const id = (item.id || item.name || 'n' + (i+1));
        nodes.push({
            id: id,
            type: (isStep && (item.manualAdvance || item.autoDetect)) ? 'gate' : 'agent',
            label: item.label || item.description || item.name || 'Step ' + (i+1),
            position: { x: i * 280, y: 0 },
            agentId: item.agentSlug || null,
            skillIds: [],
            permissions: isStep ? { allows: item.allows||[], blocks: item.blocks||[] } : undefined,
            produces: item.produces || [],
            hooks: [],
            gateConfig: (isStep && (item.manualAdvance || item.autoDetect)) ? { condition: item.manualAdvance ? 'manual' : 'auto', autoDetect: item.autoDetect || '', manualAdvance: item.manualAdvance || '', expression: '' } : undefined
        });
        if (i > 0) {
            const cond = item.manualAdvance ? 'manual' : (item.autoDetect ? 'auto' : 'auto');
            edges.push({
                id: 'e' + i,
                from: items[i-1].id || items[i-1].name || ('n'+i),
                to: id,
                condition: cond,
                autoDetect: item.autoDetect || null,
                manualAdvance: item.manualAdvance || null
            });
        }
    });
    return {
        slug: data.slug || '',
        name: data.name || '',
        description: data.description || '',
        mode: isStep ? 'step' : 'auto',
        nodes, edges
    };
}
